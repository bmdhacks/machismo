# machismo configuration for NecroDancer (arm64 Mach-O on aarch64 Linux)
#
# Place this file next to the game binary, or set MACHISMO_CONFIG=/path/to/machismo.conf

[general]
dylib_map = dylib_map.conf
patches = patches/necrodancer.conf

[trampoline.sdl2]
lib = libSDL2-2.0.so.0
prefix = _SDL_

[trampoline.bgfx]
lib = ./build-bgfx/libbgfx-shared.so
prefix = _bgfx_
prefix = __ZN4bgfx
init_wrapper = true
renderer = opengles

[trampoline.steam_noop]
lib = STUB
prefix = __ZN3wos5steam
prefix = __ZNK3wos5steam
