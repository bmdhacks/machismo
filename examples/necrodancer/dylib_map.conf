# Dylib mapping configuration for NecroDancer
#
# Format: dylib_pattern = action
#   action can be:
#     /path/to/lib.so  — dlopen this Linux .so
#     STUB             — return 0/NULL for all symbols
#     SKIP             — leave symbols unresolved (will crash if called)
#
# Patterns match via substring against the dylib basename.
# Order matters: first match wins.

# === SFML ===
# Audio + System: load as Mach-O dylibs for perfect ABI match.
# The game's custom SFML has extra virtual methods (synchronize,
# prepareSynchronizedPlayback, virtual getPlayingOffset/setPlayingOffset)
# that shift the vtable layout. Loading the original dylibs avoids this.
libsfml-audio = MACHO:./libsfml-audio.2.5.dylib
libsfml-system = MACHO:./libsfml-system.2.5.dylib
# Graphics/Window/Network: keep as native .so (window needs macOS frameworks)
libsfml-graphics = ./build-sfml/lib/libsfml-graphics.so
libsfml-network = ./build-sfml/lib/libsfml-network.so
libsfml-window = ./build-sfml/lib/libsfml-window.so
libfreetype = libfreetype.so
libopenal = libopenal.so
libluajit = libluajit-5.1.so
libz.1 = libz.so
libzstd = libzstd.so
libcurl = libcurl.so
libvorbisfile = libvorbisfile.so
libvorbis.0 = libvorbis.so
libogg = libogg.so
libtheoradec = libtheoradec.so.1
libtheora.dylib = libtheora.so.0
libiconv = SKIP
libFLAC = libFLAC.so
libvorbisenc = libvorbisenc.so

# === System libraries ===
libc++.1 = ./build-libcxx/lib/libc++.so.1
libSystem.B = ./libsystem_shim.so
libobjc = STUB

# === Game-specific ===
libnecrolevel = MACHO:./libnecrolevel.dylib

# === Proprietary (stub out) ===
libsteam_api = STUB
libGalaxy = STUB

# === macOS frameworks (used by SFML's macOS backend, not needed) ===
Carbon = SKIP
Cocoa = SKIP
ForceFeedback = SKIP
AudioToolbox = SKIP
CoreFoundation = SKIP
CoreAudio = SKIP
CoreHaptics = SKIP
GameController = SKIP
Metal = SKIP
Foundation = SKIP
QuartzCore = SKIP
IOKit = SKIP
AppKit = SKIP
CoreGraphics = SKIP
CoreServices = SKIP
CoreVideo = SKIP
